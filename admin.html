<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Admin Panel</title>

<style>
body{
font-family:Arial;
background:#f5f5f5;
text-align:center;
padding:20px;
}

.box{
background:white;
padding:20px;
border-radius:10px;
max-width:400px;
margin:auto;
box-shadow:0 0 10px rgba(0,0,0,0.1);
}

input{
width:90%;
padding:10px;
margin:10px;
font-size:16px;
}

button{
background:#4CAF50;
color:white;
border:none;
padding:12px 20px;
font-size:18px;
border-radius:8px;
cursor:pointer;
}

button:hover{
background:#45a049;
}
</style>

</head>
<body>

<div class="box">

<h2>ADMIN PANEL</h2>

<input id="date" placeholder="Date (14-03-2026)">

<input id="img" placeholder="Proof Image Link">

<br>

<button onclick="addProof()">ADD PROOF</button>

</div>

<script>

function addProof(){

let date = document.getElementById("date").value;
let img = document.getElementById("img").value;

let proofs = JSON.parse(localStorage.getItem("proofs")) || [];

proofs.unshift({date:date,img:img});

localStorage.setItem("proofs",JSON.stringify(proofs));

alert("Proof Added Successfully");

}

</script>

</body>
</html>
